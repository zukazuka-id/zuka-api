# /etc/nginx/nginx.conf — Main Nginx configuration for Zuka API
# Place at /etc/nginx/nginx.conf on the Lightsail instance

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
    multi_accept on;
}

http {
    # ── Basic Settings ───────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/json;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Rate Limiting Zones ──────────────────────────────────────
    # General API: 30 req/s per IP (generous — Hono handles the real limits)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Auth endpoints: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    # Connection limit: 20 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Default Server (catch-all, reject unknown hosts) ─────────
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/api.zuka.plus/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.zuka.plus/privkey.pem;
        include snippets/ssl-params.conf;

        return 444;
    }

    # ── Include Site Configurations ──────────────────────────────
    include /etc/nginx/sites-enabled/*.conf;
}
