# ── PRODUCTION: api.zuka.plus ───────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.zuka.plus;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name api.zuka.plus;

    # SSL certificates (obtained via certbot)
    ssl_certificate /etc/letsencrypt/live/api.zuka.plus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zuka.plus/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.zuka.plus/chain.pem;

    include snippets/ssl-params.conf;
    include snippets/security-headers.conf;

    # Logging
    access_log /var/log/nginx/api.zuka.plus.access.log;
    error_log /var/log/nginx/api.zuka.plus.error.log;

    # Request size limit (matches Hono app's 1MB limit)
    client_max_body_size 1m;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    keepalive_timeout 15;

    # Nginx rate limiting zones (second layer behind Hono's in-memory rate limiter)
    limit_req zone=api_limit burst=60 nodelay;
    limit_conn conn_limit 20;

    # Proxy to Hono production (port 3456)
    location / {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Stricter rate limiting for auth endpoints
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block sensitive paths (defense in depth)
    location ~* ^/(\.env|\.git|node_modules) {
        deny all;
    }
}
