# ── STAGING: staging-api.zuka.plus ──────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name staging-api.zuka.plus;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name staging-api.zuka.plus;

    ssl_certificate /etc/letsencrypt/live/staging-api.zuka.plus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.zuka.plus/privkey.pem;

    include snippets/ssl-params.conf;
    include snippets/security-headers.conf;

    # ── Staging access control ──────────────────────────────────
    # Uncomment ONE of the following to restrict staging access:

    # Option A: IP whitelist (recommended)
    # allow YOUR_HOME_IP;
    # allow YOUR_OFFICE_IP;
    # deny all;

    # Option B: HTTP Basic Auth
    # auth_basic "Staging Environment — Authorized Only";
    # auth_basic_user_file /etc/nginx/.htpasswd-staging;

    # Logging
    access_log /var/log/nginx/staging-api.zuka.plus.access.log;
    error_log /var/log/nginx/staging-api.zuka.plus.error.log;

    client_max_body_size 1m;

    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    keepalive_timeout 15;

    limit_req zone=api_limit burst=60 nodelay;
    limit_conn conn_limit 20;

    # Proxy to Hono staging (port 3457)
    location / {
        proxy_pass http://127.0.0.1:3457;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3457;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(\.env|\.git|node_modules) {
        deny all;
    }
}
